<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Attendance Kiosk</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  :root{--blue:#2563eb;--blue-dark:#1d4ed8;--green:#10b981;--amber:#f59e0b;--red:#ef4444;
    --ink:#0f172a;--slate:#64748b;--muted:#94a3b8;--line:#e2e8f0;--white:#fff;}
  html,body{height:100%;overflow:hidden}
  body{font-family:'Inter',-apple-system,sans-serif;background:#0b1120;color:var(--white);height:100vh;width:100vw;position:fixed;inset:0;}
  .kiosk{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#0b1120}
  #video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
  /* bright white light surround — illuminates the face via screen glow */
  .lightframe{position:absolute;inset:0;pointer-events:none;z-index:2;
    background:
      linear-gradient(to right,#fff 0%,rgba(255,255,255,.9) 5%,transparent 17%,transparent 83%,rgba(255,255,255,.9) 95%,#fff 100%),
      linear-gradient(to bottom,transparent 0%,transparent 20%,transparent 78%,rgba(255,255,255,.8) 94%,#fff 100%);
  }
  .vignette{position:absolute;inset:0;pointer-events:none;z-index:1;background:radial-gradient(ellipse at center,transparent 55%,rgba(11,17,32,.25) 100%);}
  .topbar{position:absolute;top:0;left:0;right:0;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:22px 30px;background:linear-gradient(to bottom,rgba(11,17,32,.55),transparent);}
  .company{display:flex;align-items:center;gap:12px}
  .company-logo{width:44px;height:44px;border-radius:12px;background:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(37,99,235,.4);}
  .company-logo svg{width:24px;height:24px;color:#fff}
  .company-name{font-size:19px;font-weight:800;letter-spacing:-.3px;line-height:1.1}
  .company-tag{font-size:12px;color:rgba(255,255,255,.55);font-weight:500;margin-top:1px}
  .topbar-clock{text-align:right}
  .tb-time{font-size:26px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums;line-height:1}
  .tb-date{font-size:12.5px;color:rgba(255,255,255,.6);font-weight:500;margin-top:3px}
  .scan-zone{position:absolute;top:50%;left:50%;transform:translate(-50%,-54%);width:300px;height:360px;z-index:4;pointer-events:none;transition:.4s cubic-bezier(.34,1.4,.5,1);}
  .corner{position:absolute;width:54px;height:54px;border:4px solid rgba(255,255,255,.85);border-radius:6px}
  .corner.tl{top:0;left:0;border-right:none;border-bottom:none}.corner.tr{top:0;right:0;border-left:none;border-bottom:none}
  .corner.bl{bottom:0;left:0;border-right:none;border-top:none}.corner.br{bottom:0;right:0;border-left:none;border-top:none}
  .scan-zone.detecting .corner{border-color:var(--blue);box-shadow:0 0 22px rgba(37,99,235,.6)}
  .scan-zone.success .corner{border-color:var(--green);box-shadow:0 0 22px rgba(16,185,129,.6)}
  .scan-zone.fail .corner{border-color:var(--amber)}
  .scan-line{position:absolute;left:12px;right:12px;height:3px;border-radius:3px;background:linear-gradient(90deg,transparent,var(--blue),transparent);box-shadow:0 0 14px var(--blue);animation:scan 2.4s ease-in-out infinite;opacity:0;transition:.3s;}
  .scan-zone.detecting .scan-line{opacity:1}
  @keyframes scan{0%{top:14px}50%{top:calc(100% - 14px)}100%{top:14px}}
  .prompt{position:absolute;left:0;right:0;bottom:170px;z-index:5;text-align:center;transition:.3s;}
  .prompt-text{font-size:26px;font-weight:700;letter-spacing:-.4px;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  .prompt-sub{font-size:15px;color:rgba(255,255,255,.65);font-weight:500;margin-top:6px}
  .result{position:absolute;left:50%;bottom:150px;transform:translateX(-50%) translateY(40px);z-index:8;width:min(560px,90vw);background:rgba(255,255,255,.97);backdrop-filter:blur(16px);border-radius:24px;padding:26px 30px;display:flex;align-items:center;gap:22px;box-shadow:0 24px 70px rgba(0,0,0,.4);opacity:0;visibility:hidden;transition:.45s cubic-bezier(.34,1.4,.5,1);}
  .result.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
  .result.in{border-bottom:6px solid var(--green)}.result.out{border-bottom:6px solid var(--blue)}.result.done{border-bottom:6px solid var(--amber)}
  .res-photo{width:88px;height:88px;border-radius:20px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;background:#eff6ff;color:var(--blue);border:3px solid #fff;box-shadow:0 4px 16px rgba(0,0,0,.12);}
  .res-photo img{width:100%;height:100%;object-fit:cover}
  .res-body{flex:1;min-width:0;color:var(--ink)}
  .res-greet{font-size:14px;font-weight:600;color:var(--slate);margin-bottom:2px}
  .res-name{font-size:30px;font-weight:900;letter-spacing:-.6px;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .res-status{display:inline-flex;align-items:center;gap:8px;margin-top:10px;padding:7px 16px;border-radius:12px;font-size:14px;font-weight:700;letter-spacing:.2px}
  .res-status.in{background:#d1fae5;color:#065f46}.res-status.out{background:#dbeafe;color:#1e40af}.res-status.done{background:#fef3c7;color:#92400e}.res-status.late{background:#fef3c7;color:#92400e}
  .res-time{text-align:right;flex-shrink:0;color:var(--ink)}
  .res-time-big{font-size:38px;font-weight:900;letter-spacing:-1.5px;font-variant-numeric:tabular-nums;line-height:.95}
  .res-time-label{font-size:12px;color:var(--slate);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-top:6px}
  .res-hours{font-size:13px;color:var(--slate);font-weight:600;margin-top:8px}

  /* FULL-SCREEN FLASH (check-in green / checkout-confirm red) */
  .flash{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .25s ease;padding:30px}
  .flash.show{opacity:1;visibility:visible}
  .flash.green{background:linear-gradient(160deg,#10b981,#059669)}
  .flash.red{background:linear-gradient(160deg,#ef4444,#dc2626)}
  .flash.blue{background:linear-gradient(160deg,#3b82f6,#2563eb)}
  .flash-inner{text-align:center;color:#fff;max-width:560px;width:100%;transform:scale(.9);transition:transform .3s cubic-bezier(.34,1.4,.5,1)}
  .flash.show .flash-inner{transform:scale(1)}
  .flash-photo{width:120px;height:120px;border-radius:30px;margin:0 auto 22px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:46px;font-weight:800;background:rgba(255,255,255,.2);border:4px solid rgba(255,255,255,.5);color:#fff}
  .flash-photo img{width:100%;height:100%;object-fit:cover}
  .flash-icon{width:72px;height:72px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center}
  .flash-icon svg{width:72px;height:72px;color:#fff;stroke-width:2.5}
  .flash-title{font-size:22px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;opacity:.92}
  .flash-name{font-size:46px;font-weight:900;letter-spacing:-1px;line-height:1.05;margin-top:6px}
  .flash-time{font-size:64px;font-weight:900;letter-spacing:-2px;font-variant-numeric:tabular-nums;margin-top:14px;line-height:1}
  .flash-note{font-size:17px;font-weight:600;opacity:.9;margin-top:14px;line-height:1.4}
  .flash-actions{display:flex;gap:14px;justify-content:center;margin-top:30px}
  .flash-btn{padding:18px 34px;border:none;border-radius:16px;font-size:19px;font-weight:800;font-family:inherit;cursor:pointer;min-width:150px}
  .flash-btn.confirm{background:#fff;color:#dc2626}
  .flash-btn.cancel{background:rgba(255,255,255,.22);color:#fff;border:2px solid rgba(255,255,255,.5)}
  .flash-btn:active{transform:scale(.96)}
  .flash-count{position:absolute;bottom:40px;left:0;right:0;text-align:center;font-size:15px;font-weight:600;color:rgba(255,255,255,.8)}
  .bottombar{position:absolute;bottom:0;left:0;right:0;z-index:5;display:flex;align-items:center;justify-content:center;gap:40px;padding:24px;background:linear-gradient(to top,rgba(11,17,32,.55),transparent);}
  .bcount{text-align:center}
  .bcount-num{font-size:30px;font-weight:900;letter-spacing:-1px;line-height:1;font-variant-numeric:tabular-nums}
  .bcount-num.green{color:var(--green)}.bcount-num.blue{color:#60a5fa}
  .bcount-label{font-size:12px;color:rgba(255,255,255,.55);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:6px}
  .bcount-div{width:1px;height:38px;background:rgba(255,255,255,.15)}
  .gear{position:absolute;top:84px;right:24px;z-index:15;display:flex;align-items:center;gap:8px;padding:12px 20px;border-radius:13px;background:var(--blue);border:none;cursor:pointer;color:#fff;transition:.2s;font-weight:700;font-size:14px;font-family:inherit;box-shadow:0 6px 20px rgba(37,99,235,.5);}
  .gear:hover{background:var(--blue-dark);transform:translateY(-1px)}
  .gear svg{width:18px;height:18px}
  .kiosk-refresh{position:absolute;top:84px;right:148px;z-index:15;display:flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:13px;background:rgba(255,255,255,.14);border:none;cursor:pointer;color:#fff;transition:.2s;box-shadow:0 6px 18px rgba(0,0,0,.2)}
  .kiosk-refresh:hover{background:rgba(255,255,255,.24)}
  .kiosk-refresh:active{transform:scale(.92) rotate(-180deg)}
  .kiosk-refresh svg{width:21px;height:21px}
  body.testing .kiosk-refresh{display:none!important}
  .sync{position:absolute;bottom:24px;left:22px;z-index:9;display:flex;align-items:center;gap:7px;padding:9px 15px;border-radius:11px;background:rgba(255,255,255,.12);font-size:13px;font-weight:700;color:rgba(255,255,255,.75)}
  .sync .sd{width:9px;height:9px;border-radius:50%;background:var(--amber)}
  .sync.online .sd{background:var(--green);box-shadow:0 0 0 3px rgba(16,185,129,.25)}.sync.online{color:#fff;background:rgba(16,185,129,.2)}
  .state{position:absolute;inset:0;z-index:20;background:#0b1120;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:30px}
  .state.hidden{display:none}
  .ring{width:54px;height:54px;border:4px solid rgba(255,255,255,.12);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .state-icon{width:64px;height:64px;color:rgba(255,255,255,.4)}
  .state-title{font-size:20px;font-weight:700}
  .state-sub{font-size:14px;color:rgba(255,255,255,.6);max-width:360px;line-height:1.6}
  .state-btn{margin-top:8px;padding:14px 30px;border:none;border-radius:13px;background:var(--blue);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  .state-btn:hover{background:var(--blue-dark)}
  .pinwrap{position:fixed;inset:0;z-index:60;background:rgba(11,17,32,.92);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center}
  .pinwrap.open{display:flex}
  .pinbox{text-align:center}
  .pin-title{font-size:18px;font-weight:700;margin-bottom:6px}
  .pin-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
  .pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:30px}
  .pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.35)}
  .pin-dot.filled{background:var(--blue);border-color:var(--blue)}
  .pin-dot.err{background:var(--red);border-color:var(--red);animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:280px;margin:0 auto}
  .pin-key{width:80px;height:80px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;font-size:28px;font-weight:600;cursor:pointer;font-family:inherit;transition:.12s}
  .pin-key:active{background:rgba(255,255,255,.2);transform:scale(.94)}
  .pin-key.fn{font-size:15px;font-weight:600;color:var(--muted)}
  .pin-cancel{margin-top:24px;background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;font-family:inherit}
  .overlay{display:none;position:fixed;inset:0;z-index:70;background:rgba(11,17,32,.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:24px}
  .overlay.open{display:flex}
  .modal{background:var(--white);color:var(--ink);border-radius:22px;width:100%;max-width:560px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .modal-head{padding:22px 26px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .modal-title{font-size:19px;font-weight:800}
  .x-btn{width:38px;height:38px;border-radius:10px;background:#f1f5f9;border:none;cursor:pointer;color:var(--slate);display:flex;align-items:center;justify-content:center}
  .x-btn:hover{background:#fee2e2;color:var(--red)}.x-btn svg{width:18px;height:18px}
  .mtabs{display:flex;gap:4px;padding:14px 26px 0}
  .mtab{padding:10px 16px;border:none;background:none;cursor:pointer;font-size:14px;font-weight:600;color:var(--muted);font-family:inherit;border-bottom:2px solid transparent}
  .mtab.active{color:var(--blue);border-bottom-color:var(--blue)}
  .mbody{padding:24px 26px;overflow-y:auto}
  .field{margin-bottom:16px}
  .label{font-size:12px;font-weight:700;color:var(--slate);margin-bottom:7px;display:block;text-transform:uppercase;letter-spacing:.4px}
  .input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:11px;font-size:14px;font-family:inherit;color:var(--ink);outline:none;transition:.15s}
  .input:focus{border-color:var(--blue);box-shadow:0 0 0 3px #eff6ff}
  .row{display:flex;gap:12px}.row .field{flex:1}
  .cap{position:relative;width:100%;height:300px;border-radius:14px;overflow:hidden;background:#f1f5f9;border:2px dashed var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer}
  .cap video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
  .cap-icon{width:44px;height:44px;color:var(--muted)}
  .cap-hint{font-size:13px;color:var(--muted);font-weight:600;text-align:center;padding:0 20px;z-index:1}
  .cap-flip{position:absolute;top:10px;right:10px;background:rgba(15,23,42,.8);color:#fff;border:none;padding:7px 13px;border-radius:18px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;z-index:3}
  .cap-live{position:absolute;top:10px;left:10px;background:rgba(15,23,42,.8);color:#fff;padding:6px 12px;border-radius:18px;font-size:12px;font-weight:700;z-index:3;display:flex;align-items:center;gap:6px}
  .cap-live .ld{width:8px;height:8px;border-radius:50%;background:var(--red);transition:.2s}
  .cap-live.found{background:rgba(16,185,129,.92)}.cap-live.found .ld{background:#fff}
  .cap-prog{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(15,23,42,.88);color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;display:flex;gap:8px;align-items:center;z-index:3}
  .cdots{display:flex;gap:6px}.cd{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.3)}.cd.on{background:var(--green)}
  .btn{padding:13px 20px;border:none;border-radius:12px;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;transition:.15s}
  .btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--blue-dark)}
  .btn-primary:disabled{background:var(--muted);cursor:not-allowed}
  .btn-ghost{background:#f1f5f9;color:var(--slate);border:1px solid var(--line)}.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
  .bgrp{display:flex;gap:10px;margin-top:4px}.bgrp .btn{flex:1}
  .ritem{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);border-radius:13px;margin-bottom:8px}
  .rphoto{width:46px;height:46px;border-radius:12px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800}
  .rphoto img{width:100%;height:100%;object-fit:cover}
  .rinfo{flex:1}.rname{font-size:14px;font-weight:700}.rmeta{font-size:12px;color:var(--muted);margin-top:2px}
  .rdel{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center}
  .rdel:hover{border-color:var(--red);color:var(--red);background:#fef2f2}.rdel svg{width:16px;height:16px}
  .empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}
  .note{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:14px 16px;font-size:13px;color:#92400e;line-height:1.6;margin-bottom:18px}
  .note strong{font-weight:800}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--ink);color:#fff;padding:14px 24px;border-radius:13px;font-size:14px;font-weight:600;z-index:200;transition:.3s;box-shadow:0 10px 30px rgba(0,0,0,.3);max-width:90vw;text-align:center}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.ok{background:var(--green)}.toast.err{background:var(--red)}
  /* LAUNCH SCREEN */
  .launch{position:fixed;inset:0;z-index:70;background:linear-gradient(160deg,#0f1b33,#0a1322);display:flex;align-items:center;justify-content:center;padding:28px}
  .launch.hidden{display:none}
  .launch-inner{text-align:center;width:100%;max-width:420px}
  .launch-logo{width:74px;height:74px;border-radius:20px;background:linear-gradient(135deg,#2563eb,#1e3a8a);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;box-shadow:0 12px 34px rgba(37,99,235,.45)}
  .launch-logo svg{width:38px;height:38px;color:#fff}
  .launch-co{font-size:30px;font-weight:900;color:#fff;letter-spacing:-.6px}
  .launch-sub{font-size:15px;color:rgba(255,255,255,.5);font-weight:600;margin-top:6px;margin-bottom:38px}
  .launch-actions{display:flex;flex-direction:column;gap:13px}
  .launch-btn{display:flex;align-items:center;justify-content:center;gap:11px;padding:20px;border-radius:16px;font-size:18px;font-weight:800;font-family:inherit;cursor:pointer;border:none;transition:.15s}
  .launch-btn svg{width:23px;height:23px}
  .launch-btn.primary{background:#2563eb;color:#fff;box-shadow:0 10px 28px rgba(37,99,235,.4)}
  .launch-btn.primary:active{transform:scale(.97)}
  .launch-btn.ghost{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.18)}
  .launch-btn.ghost:active{transform:scale(.97)}
  .launch-test{margin-top:34px;background:none;border:none;color:rgba(255,255,255,.25);font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;letter-spacing:.5px;padding:8px 16px;border-radius:8px}
  .launch-test:active{color:rgba(255,255,255,.6)}

  /* TEST MODE */
  .testmode{position:fixed;inset:0;z-index:75;background:linear-gradient(to bottom,rgba(10,19,34,.82) 0%,rgba(10,19,34,.35) 30%,rgba(10,19,34,.35) 60%,rgba(10,19,34,.9) 100%);display:none;flex-direction:column;padding:0}
  .testmode.show{display:flex}
  body.testing .scan-zone,body.testing .prompt,body.testing .bottombar,body.testing .topbar,body.testing .result,body.testing .flash,body.testing .sync,body.testing .gear{display:none!important}
  .tm-top{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;background:rgba(10,19,34,.6);backdrop-filter:blur(8px)}
  .tm-title{color:#fff;font-size:18px;font-weight:800;display:flex;align-items:center;gap:10px}
  .tm-badge{font-size:11px;font-weight:700;background:rgba(37,99,235,.35);color:#93c5fd;padding:4px 10px;border-radius:20px;letter-spacing:.3px}
  .tm-exit{background:rgba(255,255,255,.15);border:none;color:#fff;font-family:inherit;font-size:14px;font-weight:700;padding:9px 16px;border-radius:10px;cursor:pointer}
  .tm-stats{display:grid;grid-template-columns:repe
